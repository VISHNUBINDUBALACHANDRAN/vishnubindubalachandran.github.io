<script async defer src="https://buttons.github.io/buttons.js"></script>

<style>
  /* Dynamic Background and Text Color */
  .dynamic-bg {
      background-color: white; /* Light mode background */
      color: black; /* Light mode text color */
  }

  .dark .dynamic-bg {
      background-color: #1a202c; /* Dark mode background */
      color: white; /* Dark mode text color */
  }

  /* Match Image Style with Header/Footer */
  img.avatar, .avatar, .profile-picture {
      border-radius: 0 !important; /* Remove rounded corners */
      border: 1px solid inherit !important; /* Match border with parent container */
      background-color: inherit !important; /* Match background to header/footer */
      outline: none !important; /* Remove outlines */
      box-shadow: none !important; /* Remove any shadow */
  }

  /* Ensure the image inherits color based on theme */
  body.light img.avatar, body.light .avatar {
      background-color: #f8f9fa; /* Light mode: header/footer background color */
      border-color: #f8f9fa; /* Light mode: header/footer border */
  }

  body.dark img.avatar, body.dark .avatar {
      background-color: #1a202c; /* Dark mode: header/footer background color */
      border-color: #1a202c; /* Dark mode: header/footer border */
  }
</style>

<script>
  // Apply dark mode based on user preference
  if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
  } else {
      document.documentElement.classList.remove('dark');
  }
</script>
